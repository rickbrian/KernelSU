name: Build LKM for bluejay android13 5.10.107

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-lkm-5.10.107.yml'
      - 'kernel/**'

concurrency:
  group: bluejay-5.10.107-lkm
  cancel-in-progress: true

jobs:
  build-lkm-5-10-107:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout KernelSU
        uses: actions/checkout@v4
        with:
          path: KernelSU

      - name: Install repo
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Restore kernel source cache
        id: restore-kernel-source-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            kernel_ws/.repo/project-objects
            kernel_ws/.repo/projects
          key: bluejay-5.10.107-android13-f0fe4f-repo-v1

      - name: Restore GKI build output cache
        id: restore-gki-output-cache
        uses: actions/cache/restore@v4
        with:
          path: kernel_ws/out
          key: bluejay-5.10.107-android13-f0fe4f-out-v1

      - name: Sync bluejay android13 5.10.107 kernel source
        run: |
          mkdir -p kernel_ws
          cd kernel_ws
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android13-5.10-2022-04 \
            --depth=1
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('.repo/manifests/default.xml')
          text = manifest.read_text()
          old = 'revision="android13-5.10-2022-04" upstream="android13-5.10-2022-04" dest-branch="android13-5.10-2022-04"'
          new = 'revision="android-gs-bluejay-5.10-android13" upstream="android-gs-bluejay-5.10-android13" dest-branch="android-gs-bluejay-5.10-android13"'
          if old not in text:
              raise SystemExit('kernel/common android13-5.10-2022-04 manifest entry not found')
          manifest.write_text(text.replace(old, new))
          PY
          repo sync -c -j4 --no-tags --fail-fast --force-sync

      - name: Save kernel source cache
        if: steps.restore-kernel-source-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            kernel_ws/.repo/project-objects
            kernel_ws/.repo/projects
          key: bluejay-5.10.107-android13-f0fe4f-repo-v1

      - name: Build GKI once for module headers
        run: |
          if find "$GITHUB_WORKSPACE/kernel_ws/out" -path '*/include/config/auto.conf' -print -quit | grep -q . \
             && find "$GITHUB_WORKSPACE/kernel_ws/out" -name Module.symvers -print -quit | grep -q .; then
            echo "Reusing cached GKI build output"
            exit 0
          fi
          cd kernel_ws
          LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: Save GKI build output cache
        if: steps.restore-gki-output-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: kernel_ws/out
          key: bluejay-5.10.107-android13-f0fe4f-out-v1

      - name: Build KernelSU module against bluejay 5.10.107 tree
        run: |
          cd KernelSU/kernel
          KBUILD_OUT="$(find "$GITHUB_WORKSPACE/kernel_ws/out" -path '*/include/config/auto.conf' -print -quit)"
          KBUILD_OUT="${KBUILD_OUT%/include/config/auto.conf}"
          if [ -z "$KBUILD_OUT" ] || [ ! -f "$KBUILD_OUT/Module.symvers" ]; then
            echo "Could not find prepared kernel build output" >&2
            find "$GITHUB_WORKSPACE/kernel_ws" -name auto.conf -o -name Module.symvers -o -name vmlinux
            exit 1
          fi
          echo "Using KBUILD_OUTPUT=$KBUILD_OUT"
          CLANG_BIN="$(find "$GITHUB_WORKSPACE/kernel_ws/prebuilts/clang/host/linux-x86" -path '*/bin/clang' -print -quit)"
          if [ -z "$CLANG_BIN" ]; then
            echo "Could not find Android clang prebuilt" >&2
            find "$GITHUB_WORKSPACE/kernel_ws/prebuilts/clang/host/linux-x86" -maxdepth 4 -type f -name clang
            exit 1
          fi
          export PATH="$(dirname "$CLANG_BIN"):$PATH"
          clang --version
          cp "$KBUILD_OUT/vmlinux" "$GITHUB_WORKSPACE/kernel_ws/common/vmlinux"
          ARCH=arm64 LLVM=1 LLVM_IAS=1 KBUILD_OUTPUT="$KBUILD_OUT" make KDIR="$GITHUB_WORKSPACE/kernel_ws/common" \
               O="$KBUILD_OUT" \
               ODIR="$GITHUB_WORKSPACE/ksu_out" \
               CONFIG_KSU=m CC=clang
          mkdir -p "$GITHUB_WORKSPACE/out"
          cp "$GITHUB_WORKSPACE/ksu_out/kernelsu.ko" "$GITHUB_WORKSPACE/out/bluejay-android13-5.10.107_kernelsu.ko"
          llvm-strip -d "$GITHUB_WORKSPACE/out/bluejay-android13-5.10.107_kernelsu.ko" || true
          modinfo "$GITHUB_WORKSPACE/out/bluejay-android13-5.10.107_kernelsu.ko" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluejay-android13-5.10.107-lkm
          path: out/bluejay-android13-5.10.107_kernelsu.ko
