name: Build LKM for KernelSU
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - 'kernel/**'
  workflow_call:
    inputs:
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
      expected_size2:
        description: 'Second expected signature size (for PR builds)'
        required: false
        default: ''
        type: string
      expected_hash2:
        description: 'Second expected signature hash (for PR builds)'
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
jobs:
  build-lkm:
    strategy:
      matrix:
        kmi:
          - android13-5.10
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: ${{ inputs.ddk_release || '20260313' }}
      expected_size2: ${{ inputs.expected_size2 || '' }}
      expected_hash2: ${{ inputs.expected_hash2 || '' }}
